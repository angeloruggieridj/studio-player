name: Build Plugin

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: read

env:
  OBS_VERSION: "32.1.2"
  OBS_DEPS_VERSION: "2025-08-23"

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install OBS dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libobs-dev qt6-base-dev cmake ninja-build

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/usr"

      - name: Build
        run: cmake --build build

      - name: Install
        run: DESTDIR="${{ github.workspace }}/release" cmake --install build

      - name: Package
        run: tar -czf obs-studio-player-linux-x86_64.tar.gz -C "${{ github.workspace }}/release" .

      - uses: actions/upload-artifact@v7
        with:
          name: obs-studio-player-linux
          path: obs-studio-player-linux-x86_64.tar.gz

  windows:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt6
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          # py7zr 1.x regressed archive extraction and makes aqt fail with
          # "Bad7zFile: Specified path is bad: .../qt_lib_uitools.pri" while
          # unpacking Qt. Pin py7zr<1.0 (resolves to 0.22.0), the known-good
          # extractor for aqtinstall 3.1.x.
          python -m pip install "aqtinstall==3.1.*" "py7zr<1.0"
          python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 -O C:\Qt
          "Qt6_DIR=C:\Qt\6.7.3\msvc2019_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\Qt\6.7.3\msvc2019_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download OBS pre-built deps
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path C:\deps-raw -Force
          New-Item -ItemType Directory -Path C:\obs-deps -Force
          # Anchor pattern to a digit so windows-deps-qt6-* is excluded
          gh release download --repo obsproject/obs-deps --pattern "windows-deps-[0-9]*-x64*.zip" --dir C:\deps-raw
          $zip = (Get-ChildItem "C:\deps-raw" -Filter "*.zip" | Select-Object -First 1).FullName
          Write-Host "Extracting: $zip"
          Expand-Archive $zip -DestinationPath C:\obs-deps-extract
          # Handle zips with a single inner directory vs direct content
          $top = Get-ChildItem "C:\obs-deps-extract"
          if ($top.Count -eq 1 -and $top[0].PSIsContainer) {
            Get-ChildItem $top[0].FullName | Move-Item -Destination C:\obs-deps
          } else {
            $top | Move-Item -Destination C:\obs-deps
          }
          Write-Host "obs-deps contents: $(Get-ChildItem C:\obs-deps | Select-Object -ExpandProperty Name)"

      - name: Download OBS source
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/obsproject/obs-studio/archive/refs/tags/${{ env.OBS_VERSION }}.zip" -OutFile obs.zip
          Expand-Archive obs.zip -DestinationPath C:\

      - name: Configure OBS
        shell: cmd
        run: |
          cmake -B C:\obs-build -S "C:\obs-studio-${{ env.OBS_VERSION }}" -A x64 ^
            -DENABLE_PLUGINS=OFF ^
            -DENABLE_SCRIPTING=OFF ^
            -DENABLE_BROWSER=OFF ^
            -DENABLE_UPDATER=OFF ^
            -DCMAKE_SYSTEM_VERSION=10.0 ^
            -DDepsPath="C:\obs-deps" ^
            -DFFMPEG_PATH="C:\obs-deps" ^
            -DQTDIR="%Qt6_DIR%" ^
            -DCMAKE_PREFIX_PATH="C:\obs-deps;%Qt6_DIR%"

      - name: Build OBS
        run: cmake --build C:\obs-build --target obs-frontend-api --config Release --parallel

      - name: Install OBS dev
        run: cmake --install C:\obs-build --config Release --component Development --prefix C:\obs-dev

      - name: Configure plugin
        shell: cmd
        run: |
          cmake -B build -S . -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="C:\obs-dev;%Qt6_DIR%;C:\obs-deps"

      - name: Build plugin
        run: cmake --build build --config Release

      - name: Install plugin
        run: cmake --install build --config Release --prefix "${{ github.workspace }}\release"

      - name: Package
        run: Compress-Archive -Path "${{ github.workspace }}\release\*" -DestinationPath obs-studio-player-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: obs-studio-player-windows
          path: obs-studio-player-windows.zip

  macos:
    name: macOS Apple Silicon
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Download OBS pre-built deps
        run: |
          mkdir -p /tmp/obs-deps /tmp/obs-deps-qt6
          curl -fsSL \
            "https://github.com/obsproject/obs-deps/releases/download/${{ env.OBS_DEPS_VERSION }}/macos-deps-${{ env.OBS_DEPS_VERSION }}-arm64.tar.xz" \
            | tar -xJ -C /tmp/obs-deps
          curl -fsSL \
            "https://github.com/obsproject/obs-deps/releases/download/${{ env.OBS_DEPS_VERSION }}/macos-deps-qt6-${{ env.OBS_DEPS_VERSION }}-arm64.tar.xz" \
            | tar -xJ -C /tmp/obs-deps-qt6

      - name: Verify macOS Qt dependency version
        run: |
          /tmp/obs-deps-qt6/bin/qtpaths --qt-version
          test "$(/tmp/obs-deps-qt6/bin/qtpaths --qt-version)" = "6.8.3"

      - name: Verify macOS SDK version
        run: |
          sdk_version="$(xcrun --sdk macosx --show-sdk-platform-version)"
          echo "macOS SDK: $sdk_version"
          awk -v sdk="$sdk_version" 'BEGIN { exit (sdk >= 15.0) ? 0 : 1 }'

      - name: Clone OBS source
        run: |
          git clone --depth=1 --branch ${{ env.OBS_VERSION }} \
            https://github.com/obsproject/obs-studio.git /tmp/obs

          # OBS's Metal renderer (libobs-metal) is a Swift-only target, but the
          # top-level project() never enables the Swift language, so CMake's
          # generate step fails with "can not determine linker language for
          # target: libobs-metal". We only need libobs + obs-frontend-api dev
          # files to build the plugin; libobs-metal is a runtime graphics module
          # that nothing here links against (it depends on libobs, not the other
          # way around). Drop it from the OBS build so configure succeeds.
          sed -i.bak 's/^\( *\)add_subdirectory(libobs-metal)/\1# add_subdirectory(libobs-metal) # disabled: Swift target not needed for dev build/' /tmp/obs/CMakeLists.txt
          grep -n 'libobs-metal' /tmp/obs/CMakeLists.txt

      - name: Configure OBS
        run: |
          cmake -B /tmp/obs-build -S /tmp/obs \
            -G Xcode \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_BROWSER=OFF \
            -DENABLE_VLC=OFF \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="$(xcrun --sdk macosx --show-sdk-path)" \
            -DCMAKE_PREFIX_PATH="/tmp/obs-deps-qt6;/tmp/obs-deps"

      - name: Build OBS
        run: cmake --build /tmp/obs-build --target obs-frontend-api --config Release --parallel

      - name: Install OBS dev
        run: cmake --install /tmp/obs-build --config Release --component Development --prefix /tmp/obs-dev

      - name: Configure plugin
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -Dlibobs_DIR="/tmp/obs-dev/Frameworks/libobs.framework/Resources/cmake" \
            -Dobs-frontend-api_DIR="/tmp/obs-dev/lib/cmake/obs-frontend-api" \
            -DQt6_DIR="/tmp/obs-deps-qt6/lib/cmake/Qt6" \
            -DCMAKE_PREFIX_PATH="/tmp/obs-dev;/tmp/obs-deps-qt6;/tmp/obs-deps"

      - name: Build plugin
        run: cmake --build build

      - name: Install plugin
        run: DESTDIR="${{ github.workspace }}/release" cmake --install build

      - name: Package
        run: |
          bundle="macos-package/obs-studio-player.plugin"
          bundle_version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$bundle_version" | grep -Eq '^[0-9]+([.][0-9]+){1,2}([-.][0-9A-Za-z.]+)?$'; then
            bundle_version="1.0.0"
          fi

          mkdir -p "$bundle/Contents/MacOS" "$bundle/Contents/Resources"

          plugin_binary="$(find "${{ github.workspace }}/release" -type f -name 'libobs-studio-player.*' -print -quit)"
          plugin_data="$(find "${{ github.workspace }}/release" -type d -path '*/obs-studio-player' -print -quit)"

          if [ -z "$plugin_binary" ]; then
            echo "Could not find the built macOS plugin binary"
            find "${{ github.workspace }}/release" -maxdepth 6 -type f -print
            exit 1
          fi

          if [ -z "$plugin_data" ]; then
            echo "Could not find the installed plugin data directory"
            find "${{ github.workspace }}/release" -maxdepth 6 -type d -print
            exit 1
          fi

          cp "$plugin_binary" "$bundle/Contents/MacOS/obs-studio-player"
          cp -R "$plugin_data"/. "$bundle/Contents/Resources/"
          chmod +x "$bundle/Contents/MacOS/obs-studio-player"

          cat > "$bundle/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>obs-studio-player</string>
            <key>CFBundleIdentifier</key>
            <string>com.substazz.obs-studio-player</string>
            <key>CFBundleName</key>
            <string>Studio Player</string>
            <key>CFBundlePackageType</key>
            <string>BNDL</string>
            <key>CFBundleShortVersionString</key>
            <string>${bundle_version}</string>
            <key>CFBundleVersion</key>
            <string>${bundle_version}</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

          printf 'BNDL????' > "$bundle/Contents/PkgInfo"

          binary="$bundle/Contents/MacOS/obs-studio-player"

          # Qt frameworks are linked with absolute install names that point at
          # the build machine (e.g. /opt/homebrew/opt/qtbase/lib/QtCore.framework
          # or /tmp/obs-deps-qt6/...). Those paths don't exist on user machines,
          # so dyld fails to load the plugin and OBS reports "failed to load".
          # Rewrite every absolute Qt reference to @rpath so the plugin resolves
          # Qt from OBS.app's own bundled frameworks. Derive the actual install
          # names from the binary itself rather than guessing build prefixes, so
          # this stays correct regardless of where Qt came from.
          otool -L "$binary" | awk 'NR > 1 { print $1 }' \
            | grep -E '/Qt[A-Za-z]+\.framework/' \
            | grep -v '^@rpath/' \
            | while read -r dep; do
                new="$(printf '%s' "$dep" | sed -E 's#^.*/(Qt[A-Za-z]+\.framework/.*)$#@rpath/\1#')"
                echo "Rewriting Qt install name: $dep -> $new"
                install_name_tool -change "$dep" "$new" "$binary"
              done

          if otool -L "$binary" |
            grep -E '/Qt[A-Za-z]+\.framework/' | grep -v '@rpath/'; then
            echo "Absolute Qt install names leaked into the macOS plugin bundle"
            exit 1
          fi

          codesign --force --sign - "$binary"
          codesign --force --deep --sign - "$bundle"

          tar -czf obs-studio-player-macos.tar.gz -C macos-package obs-studio-player.plugin

      - uses: actions/upload-artifact@v7
        with:
          name: obs-studio-player-macos
          path: obs-studio-player-macos.tar.gz

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux
      - windows
      - macos
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/obs-studio-player-linux-x86_64.tar.gz
            release-assets/obs-studio-player-windows.zip
            release-assets/obs-studio-player-macos.tar.gz
